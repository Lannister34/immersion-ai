name: Architecture decision
description: Propose a change to framework, boundaries, contracts, or delivery process.
title: "adr: "
labels:
  - architecture
body:
  - type: textarea
    id: context
    attributes:
      label: Context
    validations:
      required: true
  - type: textarea
    id: decision
    attributes:
      label: Proposed decision
    validations:
      required: true
  - type: textarea
    id: ownership
    attributes:
      label: Source of truth and ownership impact
      description: Which layer will own the data and rules after this decision?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: true
  - type: textarea
    id: consequences
    attributes:
      label: Consequences
    validations:
      required: true
  - type: textarea
    id: invariants
    attributes:
      label: Invariants and boundary rules
      description: Which guarantees and boundaries does this decision create or change?
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: How this will be validated
    validations:
      required: true
