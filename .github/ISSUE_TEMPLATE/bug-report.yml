name: Bug report
description: Record a reproducible defect before implementation starts.
title: "bug: "
labels:
  - bug
body:
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Describe user impact, severity, and why this matters now.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Provide exact steps, data, and environment details.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: root-cause-hypothesis
    attributes:
      label: Suspected seam
      description: Which module, boundary, or ownership problem is likely involved?
  - type: textarea
    id: validation
    attributes:
      label: Validation plan
      description: State automated and manual checks required for the fix.
    validations:
      required: true

